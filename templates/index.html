<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Registry System</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        href="/static/style.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="mb-4 text-center">Address Registry System</h1>

    <!-- Upload Section -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Upload PDF</h5>
            <form id="uploadForm">
                <div class="mb-3">
                    <input
                        type="file"
                        id="fileInput"
                        accept=".pdf"
                        multiple
                        class="form-control"
                    >
                </div>
                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Upload File(s)
                </button>
                <div id="uploadProgress" style="display:none;" class="mt-3">
                    <div class="progress mb-2">
                        <div 
                            id="progressBar" 
                            class="progress-bar" 
                            role="progressbar" 
                            style="width: 0%"
                        ></div>
                    </div>
                    <small id="progressText" class="text-muted"></small>
                </div>
            </form>
        </div>
    </div>

    <!-- Statistics Section -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Statistics</h5>
            <div class="row text-center">
                <div class="col-md-3 mb-2">
                    <div class="p-2 border rounded bg-white">
                        <div class="text-muted small">Total Documents</div>
                        <div class="fs-4 fw-bold text-dark" id="totalDocs">0</div>
                    </div>
                </div>
                <div class="col-md-3 mb-2">
                    <div class="p-2 border rounded bg-white">
                        <div class="text-muted small">Unique Addresses</div>
                        <div class="fs-4 fw-bold text-dark" id="uniqueAddresses">0</div>
                    </div>
                </div>
                <div class="col-md-3 mb-2">
                    <div class="p-2 border rounded bg-white">
                        <div class="text-muted small">Duplicate Files</div>
                        <div class="fs-4 fw-bold text-dark" id="duplicateFiles">0</div>
                    </div>
                </div>
                <div class="col-md-3 mb-2">
                    <div class="p-2 border rounded bg-white">
                        <div class="text-muted small">Duplicate Addresses</div>
                        <div class="fs-4 fw-bold text-dark" id="duplicateAddresses">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Search & Filter Section -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Search & Filter</h5>
            <form id="searchForm">
                <div class="row g-2 mb-3">
                    <div class="col-md-3">
                        <input
                            type="text"
                            id="search"
                            class="form-control"
                            placeholder="Search Address"
                        >
                    </div>
                    <div class="col-md-3">
                        <input
                            type="text"
                            id="city"
                            class="form-control"
                            placeholder="City"
                        >
                    </div>
                    <div class="col-md-3">
                        <input
                            type="text"
                            id="state"
                            class="form-control"
                            placeholder="State"
                        >
                    </div>
                    <div class="col-md-3">
                        <input
                            type="text"
                            id="zip"
                            class="form-control"
                            placeholder="ZIP"
                        >
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button
                        type="submit"
                        id="searchBtn"
                        class="btn btn-primary"
                    >
                        Search
                    </button>
                    <button 
                        type="button"
                        id="exportBtn"
                        class="btn btn-success"
                    >
                        Export CSV
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Address Table Section -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Address List</h5>
            <div class="table-responsive">
                <table class="table table-striped table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Street</th>
                            <th>City</th>
                            <th>State</th>
                            <th>ZIP</th>
                        </tr>
                    </thead>
                    <tbody id="addressTable">
                    </tbody>
                </table>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span id="paginationInfo" class="text-secondary small"></span>
                <div class="btn-group">
                    <button id="prevPageBtn" class="btn btn-outline-secondary btn-sm" disabled>Previous</button>
                    <button id="nextPageBtn" class="btn btn-outline-secondary btn-sm" disabled>Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Duplicate Candidates Section -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Duplicate Candidates</h5>
            <div class="table-responsive">
                <table class="table table-striped table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Address 1</th>
                            <th>Address 2</th>
                            <th>Similarity Score</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="duplicateTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
